name: E2E & Benchmarks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E tests (OpenResty 1.27)
        run: >
          docker compose -f e2e/docker-compose.e2e.yml up
          --build --abort-on-container-exit --exit-code-from tests-1.27
          nginx-1.27 tests-1.27

      - name: Clean up 1.27 containers
        if: always()
        run: docker compose -f e2e/docker-compose.e2e.yml down --volumes --remove-orphans

      - name: Run E2E tests (OpenResty 1.29)
        run: >
          docker compose -f e2e/docker-compose.e2e.yml up
          --build --abort-on-container-exit --exit-code-from tests-1.29
          nginx-1.29 tests-1.29

      - name: Clean up 1.29 containers
        if: always()
        run: docker compose -f e2e/docker-compose.e2e.yml down --volumes --remove-orphans

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build benchmark image
        run: docker build -f Dockerfile.bench -t lua-resty-ja4-bench .

      - name: Run benchmarks
        run: |
          set -o pipefail
          mkdir -p bench/reports
          docker run --rm lua-resty-ja4-bench resty -I /app/lib -I /app/bench /app/bench/microbench.lua | tee bench/reports/bench.txt

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: bench/reports/
          retention-days: 30
